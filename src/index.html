<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Flashdrive</title>
  <style>
    :root {
      --bg: #0b1220;
      --bg-raised: #111a2e;
      --bg-elevated: #172238;
      --border: #24324f;
      --border-strong: #334768;
      --text: #e6ecf5;
      --text-muted: #8fa0bd;
      --text-dim: #5a6a87;
      --accent: #4da8ff;
      --accent-soft: rgba(77, 168, 255, 0.12);
      --success: #31d0aa;
      --danger: #f47174;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      height: 100%;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      padding: 28px 32px;
      max-width: 720px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }

    .logo {
      width: 38px;
      height: 38px;
      border-radius: 9px;
      background: linear-gradient(135deg, #4da8ff 0%, #31d0aa 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 18px;
      color: #0b1220;
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    .version {
      margin-left: 8px;
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--danger);
      box-shadow: 0 0 0 3px rgba(244, 113, 116, 0.18);
    }

    .status.connected .status-dot {
      background: var(--success);
      box-shadow: 0 0 0 3px rgba(49, 208, 170, 0.18);
    }

    .card {
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 22px;
      box-shadow: var(--shadow);
    }

    .card-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.1px;
      color: var(--text-dim);
      margin: 0 0 14px;
    }

    .controls-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px 14px;
      align-items: center;
    }

    .btn-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 34px;
      height: 26px;
      padding: 0 10px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
    }

    .btn-group {
      display: inline-flex;
      gap: 4px;
      align-items: center;
    }

    .control-desc {
      color: var(--text-muted);
      font-size: 13px;
    }

    .section-divider {
      height: 1px;
      background: var(--border);
      margin: 16px 0;
    }

    .osk-note {
      margin-top: 14px;
      padding: 12px 14px;
      background: var(--accent-soft);
      border-left: 3px solid var(--accent);
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 12.5px;
    }

    .osk-note strong { color: var(--text); }

    footer {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 16px;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: "JetBrains Mono", "SF Mono", Consolas, monospace;
      font-size: 11.5px;
      color: var(--text-dim);
    }

    footer .label { color: var(--text-dim); }
    footer .value { color: var(--text-muted); margin-left: 6px; }

    .empty {
      color: var(--text-muted);
      font-size: 13px;
      padding: 4px 0;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="logo">F</div>
      <h1>Flashdrive<span class="version">v0.2.2</span></h1>
    </header>

    <div id="status" class="status">
      <span class="status-dot"></span>
      <span id="statusText">No controller detected</span>
    </div>

    <div class="card">
      <div class="card-title">Controls</div>
      <div id="hint" class="empty">
        Plug in a controller and press any button to see the bindings.
      </div>
    </div>

    <footer>
      <div>
        <span class="label">Left stick:</span>
        <span class="value"><span id="lx">0.00</span>, <span id="ly">0.00</span></span>
      </div>
      <div>
        <span class="label">Last action:</span>
        <span class="value" id="lastAction">(none)</span>
      </div>
    </footer>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
