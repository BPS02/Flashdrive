<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Flashdrive OSK</title>
<style>
  :root {
    --bg: rgba(11, 18, 32, 0.92);
    --key-bg: #172238;
    --key-border: #24324f;
    --key-text: #e6ecf5;
    --accent: #4da8ff;
    --accent-2: #31d0aa;
    --accent-contrast: #0b1220;
    --muted: #8fa0bd;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
  }

  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
    font-family: var(--font);
    user-select: none;
    -webkit-user-select: none;
    -webkit-font-smoothing: antialiased;
  }

  #osk {
    background: var(--bg);
    color: var(--key-text);
    padding: 14px 16px;
    border-top: 1px solid rgba(77, 168, 255, 0.35);
    box-shadow: 0 -10px 28px rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }

  .row {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin: 4px 0;
  }

  .key {
    min-width: 46px;
    height: 44px;
    background: var(--key-bg);
    border: 1px solid var(--key-border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 600;
    padding: 0 10px;
    color: var(--key-text);
    transition: transform 0.08s ease, background 0.08s ease, color 0.08s ease;
  }

  .key.wide { min-width: 150px; font-size: 13px; }
  .key.special { font-size: 13px; color: var(--muted); }

  .key.focus {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
    color: var(--accent-contrast);
    border-color: transparent;
    transform: scale(1.06);
    box-shadow: 0 0 0 3px rgba(77, 168, 255, 0.25), 0 4px 14px rgba(77, 168, 255, 0.35);
    font-weight: 700;
  }
</style>
</head>
<body>
<div id="osk"></div>

<script>
  const LAYOUT = [
    ['q','w','e','r','t','y','u','i','o','p'],
    ['a','s','d','f','g','h','j','k','l'],
    ['z','x','c','v','b','n','m'],
    ['space','backspace','enter','close'],
  ];

  const SPECIAL = {
    space:     { label: 'Space',      wide: true },
    backspace: { label: '\u232B Back' },
    enter:     { label: '\u21B5 Enter' },
    close:     { label: '\u2715 Close' },
  };

  let focusRow = 0;
  let focusCol = 0;

  function render() {
    const root = document.getElementById('osk');
    root.innerHTML = '';
    LAYOUT.forEach((row, r) => {
      const rowEl = document.createElement('div');
      rowEl.className = 'row';
      row.forEach((keyStr, c) => {
        const k = document.createElement('div');
        const meta = SPECIAL[keyStr];
        k.className = 'key' + (meta ? ' special' : '') + (meta?.wide ? ' wide' : '');
        if (r === focusRow && c === focusCol) k.classList.add('focus');
        k.textContent = meta ? meta.label : keyStr.toUpperCase();
        rowEl.appendChild(k);
      });
      root.appendChild(rowEl);
    });
  }

  window.osk.onFocus((row, col) => {
    focusRow = row;
    focusCol = col;
    render();
  });

  render();
</script>
</body>
</html>
